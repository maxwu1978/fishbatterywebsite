  <path d="M46 228c82 8 161 8 228 0" fill="none" stroke="url(#badgeAccent)" stroke-linecap="round" stroke-width="10"/>
  <circle cx="243" cy="76" r="11" fill="#ff6b2d"/>
  <path d="M209 41c24 8 39 24 42 51 2 22-6 42-24 57" fill="none" stroke="#ff6b2d" stroke-linecap="round" stroke-width="7"/>
