<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Reel Mate badge</title>
  <desc id="desc">A compact text-led badge logo for Reel Mate.</desc>
  <defs>
    <linearGradient id="badgeBg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f4261"/>
      <stop offset="100%" stop-color="#0a2c3f"/>
